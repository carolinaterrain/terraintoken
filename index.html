      }
      
      /* Critical layout styles */
      *, *::before, *::after { box-sizing: border-box; }
      html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
      body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: hsl(160 30% 3%); color: hsl(160 10% 95%); }
      #root { min-height: 100vh; }
      
      /* Critical hero skeleton */
      .hero-skeleton {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(160 30% 3%) 0%, hsl(160 40% 6%) 100%);
      }
      .skeleton-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        background: hsl(160 20% 15%);
        border-radius: 0.5rem;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      /* Hide content until React hydrates */
      .loading-placeholder { display: block; }
      .app-loaded .loading-placeholder { display: none; }

    <!-- Service Worker Registration - Deferred -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Defer SW registration to not block initial render
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => {
                console.log('Service Worker registered:', reg.scope);
                // Check for updates every hour
                setInterval(() => reg.update(), 3600000);
              })
              .catch(err => console.error('SW registration failed:', err));
          }, 2000);
        });
      }
    </script>
